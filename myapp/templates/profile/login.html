<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- Auth Header (Login / Signup Pages) -->
<nav class="navbar navbar-dark bg-dark py-3">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- Brand / Logo -->
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <i class="bi bi-mortarboard-fill me-2"></i>
            My University
        </a>

        <!-- Right Side Links -->
        <div>
            <a href="/" class="btn btn-outline-light me-2">Login</a>
            <a href="/signup/" class="btn btn-primary">Sign Up</a>
        </div>

    </div>
</nav>
<!-- Main -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-1g-6">
            <h2 class="mb-4">Login Form</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">UserName</label>
                    <input type="text" class="form-control bg-secondary text-light" name="username" id="exampleInputEmail1"
                        aria-describedby="emailHelp">
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control bg-secondary text-light" name="password" id="exampleInputPassword1">
                </div>
                <p class="text-danger"><b>{{error}}</b></p>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
        <h4>Don't have Account Click to <a href="/signup/">Signup</a></h4>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
